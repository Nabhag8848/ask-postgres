services:
  postgres:
    image: postgres:16
    container_name: ask-postgres-demo
    environment:
      POSTGRES_USER: askpostgres
      POSTGRES_PASSWORD: askpostgres
      POSTGRES_DB: analytics
    ports:
      - "${ASK_POSTGRES_PG_PORT:-5000}:5432"
    volumes:
      - ask_postgres_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askpostgres -d analytics"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  ask_postgres_pgdata:

