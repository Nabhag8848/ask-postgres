services:
  postgres:
    image: postgres:16
    container_name: pgwatch-copilot-postgres
    environment:
      POSTGRES_USER: pgwatch
      POSTGRES_PASSWORD: pgwatch
      POSTGRES_DB: analytics
    ports:
      - "${PGWATCH_PG_PORT:-5000}:5432"
    volumes:
      - pgwatch_copilot_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgwatch -d analytics"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgwatch_copilot_pgdata:

